name: 'Simple build for Linux'

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
            sudo apt update
            sudo apt-get install -y -q --no-install-recommends \
            build-essential \
            libgcrypt-dev \
            libglib2.0-dev \
            libpixman-1-dev \
            libsdl2-dev \
            libslirp-dev \
            ninja-build \
            python3-pip \
            libvte-2.91-dev \
            wget \
            zlib1g-dev

            # Not needed:
            # libgtk-3-dev # only needed for --enable-gtk
            # git \

      - name: Configure
        run: |
          ./configure --target-list=xtensa-softmmu --enable-gcrypt --enable-slirp --enable-debug --enable-vte --enable-stack-protector

      - name: Compile
        run: |
          make -j4

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qemu-system-xtensa
          path: build/qemu-system-xtensa


