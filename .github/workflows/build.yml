name: Build and release QEMU for Toit

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: linux
            runner: ubuntu-22.04
            shell: bash
          - platform: linux-aarch64
            os: linux
            runner: ubuntu-22.04-arm
            shell: bash
          - platform: windows-x86_64
            os: windows
            runner: windows-2022
            shell: msys2 {0}
          - platform: macos-x86_64
            os: macos
            runner: macos-15-intel
            shell: bash
          - platform: macos-aarch64
            os: macos
            runner: macos-15
            shell: bash
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up MSYS2
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          cache: true
          msystem: MINGW64
          install: >-
            diffutils
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-libgcrypt
            mingw-w64-x86_64-libiconv
            mingw-w64-x86_64-libslirp
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-zlib
            zip

      - name: Install vendored Windows Python build dependencies
        if: matrix.os == 'windows'
        run: >-
          python3 -m pip install --break-system-packages --no-index
          python/wheels/*.whl

      - name: Install Linux prerequisites
        if: matrix.os == 'linux'
        run: sudo .github/workflows/scripts/prerequisites-native.sh

      - name: Install macOS prerequisites
        if: matrix.os == 'macos'
        run: .github/workflows/scripts/prerequisites-macos.sh

      - name: Select release version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_version=${GITHUB_REF_NAME}
          else
            release_version=g${GITHUB_SHA:0:8}
          fi
          echo "RELEASE_VERSION=${release_version}" >> "${GITHUB_ENV}"

      - name: Configure Linux
        if: matrix.os == 'linux'
        env:
          TARGET: xtensa-softmmu,riscv32-softmmu
        run: VERSION="${RELEASE_VERSION}" .github/workflows/scripts/configure-native.sh

      - name: Configure macOS
        if: matrix.os == 'macos'
        env:
          TARGET: xtensa-softmmu,riscv32-softmmu
        run: VERSION="${RELEASE_VERSION}" .github/workflows/scripts/configure-macos.sh

      - name: Configure Windows
        if: matrix.os == 'windows'
        env:
          TARGET: xtensa-softmmu,riscv32-softmmu
        run: VERSION="${RELEASE_VERSION}" .github/workflows/scripts/configure-win.sh

      - name: Build and install
        run: ninja -C build install

      - name: Check installed emulators
        if: matrix.os != 'windows'
        run: |
          install/qemu/bin/qemu-system-xtensa --version
          install/qemu/bin/qemu-system-riscv32 --version
          install/qemu/bin/qemu-system-xtensa -M help | grep -q esp32s3
          install/qemu/bin/qemu-system-riscv32 -M help | grep -q esp32c3

      - name: Check installed emulators on Windows
        if: matrix.os == 'windows'
        run: |
          install/qemu/bin/qemu-system-xtensa.exe --version
          install/qemu/bin/qemu-system-riscv32.exe --version
          install/qemu/bin/qemu-system-xtensa.exe -M help | grep -q esp32s3
          install/qemu/bin/qemu-system-riscv32.exe -M help | grep -q esp32c3

      - name: Package Linux
        if: matrix.os == 'linux'
        run: >-
          .github/workflows/scripts/package-linux.sh
          "${RELEASE_VERSION}" "${{ matrix.platform }}"

      - name: Package macOS
        if: matrix.os == 'macos'
        run: >-
          .github/workflows/scripts/package-macos.sh
          "${RELEASE_VERSION}" "${{ matrix.platform }}"

      - name: Package Windows
        if: matrix.os == 'windows'
        run: >-
          .github/workflows/scripts/package-windows.sh
          "${RELEASE_VERSION}" "${{ matrix.platform }}"

      - name: Set up Toit
        if: matrix.platform == 'linux-x86_64'
        uses: toitlang/action-setup@v1

      - name: Run Toit smoke tests
        if: matrix.platform == 'linux-x86_64'
        run: >-
          .github/workflows/scripts/test-toit.sh
          "dist/qemu-toit-${RELEASE_VERSION}-${{ matrix.platform }}/bin"

      - name: Upload Unix binary archive
        if: matrix.os != 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: qemu-toit-${{ matrix.platform }}
          path: dist/*.tar.gz
          if-no-files-found: error

      - name: Upload Windows binary archive
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: qemu-toit-${{ matrix.platform }}
          path: dist/*.zip
          if-no-files-found: error

  checksums:
    if: >-
      always() &&
      (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')) &&
      needs.build.result == 'success'
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: qemu-toit-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: qemu-toit-release
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
